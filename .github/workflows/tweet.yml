name: Tweet Scheduler

on:
  schedule:
    # Runs daily at 9:00 AM IST (3:30 AM UTC)
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: ./scripts
        run: npm ci

      - name: Schedule tweet via Typefully
        working-directory: ./scripts
        run: node tweet.mjs
        env:
          TYPEFULLY_API_KEY: ${{ secrets.TYPEFULLY_API_KEY }}
          TYPEFULLY_SOCIAL_SET_ID: ${{ vars.TYPEFULLY_SOCIAL_SET_ID }}
